<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ruang Karsa - Ruang kreativitas, inovasi, dan kolaborasi yang sedang dikembangkan. Ikuti perkembangan kami!">
    <title>Ruang Karsa | Segera Hadir</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- Background Animated Blobs -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Main Container -->
    <main class="main-wrapper">
        <div class="card">
            <!-- Logo Section -->
            <div class="logo-container">
                <div class="logo-icon">
                    <span>Ruang Karsa</span>
                    <span class="logo-dot"></span>
                </div>
            </div>

            <!-- Title & Description -->
            <h1>Selamat Datang di Ruang Karsa</h1>
            <p class="subtitle">Kami sedang meramu ruang digital terbaik untuk mewujudkan ide-ide kreatif Anda. Nantikan kolaborasi seru dari kami!</p>

            <!-- Development Progress -->
            <div class="status-container">
                <div class="status-header">
                    <span class="status-label">
                        <span class="status-dot"></span>
                        Tahap Pengembangan
                    </span>
                    <span class="status-percentage" id="progress-val">65%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-bar"></div>
                </div>
            </div>

            <!-- Subscription Section -->
            <form class="subscribe-form" id="notify-form">
                <div class="input-group">
                    <input type="email" class="subscribe-input" placeholder="Masukkan alamat email Anda" required id="email-input">
                </div>
                <button type="submit" class="subscribe-btn">
                    <span>Kabari Saya</span>
                    <!-- Simple inline SVG arrow icon -->
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>
            </form>

            <!-- Social Media & Support Links -->
            <div class="social-links">
                <!-- Twitter / X -->
                <a href="#" class="social-btn" aria-label="Twitter">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"></path></svg>
                </a>
                <!-- Instagram -->
                <a href="#" class="social-btn" aria-label="Instagram">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                </a>
                <!-- GitHub -->
                <a href="#" class="social-btn" aria-label="GitHub">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                </a>
                <!-- Email -->
                <a href="mailto:halo@ruangkarsa.com" class="social-btn" aria-label="Email">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                </a>
            </div>

            <p class="footer-text">&copy; 2026 Ruang Karsa. All rights reserved.</p>
        </div>
    </main>

    <!-- Simple Interactive Script -->
    <script>
        document.getElementById('notify-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const emailInput = document.getElementById('email-input');
            const email = emailInput.value;
            
            if (email) {
                // Show notification in place of the form
                const form = document.getElementById('notify-form');
                form.innerHTML = `
                    <div style="background: rgba(20, 184, 166, 0.1); border: 1px solid rgba(20, 184, 166, 0.3); border-radius: 14px; padding: 16px; width: 100%; text-align: center; color: #14b8a6; font-weight: 500; font-family: var(--font-jakarta); animation: pulseLogo 1s alternate ease-in-out;">
                        Terima kasih! Kami akan segera mengabari Anda ke <strong>\${email}</strong> saat kami meluncur.
                    </div>
                `;
            }
        });
        
        // Randomly simulate a slight increment of progress bar for interactive feel
        setTimeout(() => {
            const progressBar = document.getElementById('progress-bar');
            const progressVal = document.getElementById('progress-val');
            progressBar.style.width = '68%';
            progressVal.innerText = '68%';
        }, 1500);
    </script>
</body>
</html>
